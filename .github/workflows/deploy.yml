name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: NorthAmerica
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: NorthAmerica/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_WAITLIST_FORM_ACTION: ${{ secrets.WAITLIST_FORM_ACTION }}
          NEXT_PUBLIC_WAITLIST_EMAIL_ENTRY: ${{ secrets.WAITLIST_EMAIL_ENTRY }}
          NEXT_PUBLIC_WAITLIST_PHONE_ENTRY: ${{ secrets.WAITLIST_PHONE_ENTRY }}
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./NorthAmerica/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
