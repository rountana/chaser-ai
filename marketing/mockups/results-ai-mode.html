<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>chaserAI — Results (AI Mode) marketing mockup</title>
<link rel="stylesheet" href="shared/chaser-mock.css">
</head>
<body>
<div class="stage">
  <div class="stage-stack">
  <!-- Acts 1–2: the "before chaserAI" Finder window (the pile + failed keyword search). -->
  <div class="finder" id="finder">
    <div class="finder-bar">
      <span class="finder-dot r"></span><span class="finder-dot y"></span><span class="finder-dot g"></span>
      <span class="finder-title" id="finder-title">Scans</span>
      <span class="stage-chip">Before</span>
      <span class="finder-search" id="finder-search">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>
        <span class="finder-search-q ph" id="finder-search-q">Search</span><span class="finder-caret"></span>
      </span>
    </div>
    <div class="finder-body">
      <div class="finder-sidebar">
        <div class="finder-sb-group">Favorites</div>
        <div class="finder-sb-row"><span class="finder-sb-ic"></span>AirDrop</div>
        <div class="finder-sb-row"><span class="finder-sb-ic"></span>Recents</div>
        <div class="finder-sb-row"><span class="finder-sb-ic"></span>Desktop</div>
        <div class="finder-sb-row active"><span class="finder-sb-ic"></span>Documents</div>
        <div class="finder-sb-row"><span class="finder-sb-ic"></span>Downloads</div>
      </div>
      <div class="finder-main">
        <div class="finder-grid" id="finder-grid"></div>
        <div class="finder-empty" id="finder-empty">
          <div class="finder-empty-title">No items match your search.</div>
          <div class="finder-empty-sub" id="finder-empty-sub"></div>
        </div>
        <div class="finder-statusbar" id="finder-status"></div>
      </div>
    </div>
  </div>
  <!-- Act 3: chaserAI (light theme, matching the Finder window it replaces). -->
  <div class="frame chaser-light">
    <div class="frame-bar">
      <span class="frame-dot r"></span><span class="frame-dot y"></span><span class="frame-dot g"></span>
      <span class="frame-title">chaser · results</span>
      <span class="stage-chip">After</span>
      <span class="frame-mode ai">AI: ON</span>
    </div>
    <div class="frame-body">
      <div class="mock-shell">
        <div class="mock-sb" id="sidebar"></div>
        <div>
          <div class="mock-crumbs">
            <span id="crumbs-label"></span>
            <span class="chips"><span class="mock-chip">+ filters</span></span>
          </div>
          <div class="mock-sweep-track" id="sweep-track" style="display:none;"><div class="mock-sweep-fill"></div></div>
          <div class="mock-scan-feed" id="scan-feed" style="display:none;"></div>
          <div class="mock-status-row" id="status-row"></div>
          <div id="cards"></div>
        </div>
        <div class="mock-preview" id="preview"></div>
      </div>
    </div>
  </div>
  </div>
</div>

<script type="module">
import { scenarios } from "./shared/scenarios.js";

const sidebarEl = document.getElementById("sidebar");
const cardsEl = document.getElementById("cards");
const previewEl = document.getElementById("preview");
const crumbsEl = document.getElementById("crumbs-label");
const statusRowEl = document.getElementById("status-row");

// Acts 1–2: the "before chaserAI" Finder window.
const finderEl = document.getElementById("finder");
const finderTitleEl = document.getElementById("finder-title");
const finderSearchEl = document.getElementById("finder-search");
const finderSearchQEl = document.getElementById("finder-search-q");
const finderGridEl = document.getElementById("finder-grid");
const finderEmptyEl = document.getElementById("finder-empty");
const finderEmptySubEl = document.getElementById("finder-empty-sub");
const finderStatusEl = document.getElementById("finder-status");

function escHtml(s) {
  return s.replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function renderSidebar(scenario) {
  sidebarEl.innerHTML =
    "<h5>Type</h5>" +
    scenario.sidebar.map((b) => `<div class="mock-sb-row"><span>${escHtml(b.label)}</span><b>${b.count}</b></div>`).join("");
}

function scoreClass(score) {
  return score < 0.75 ? "mock-score mid" : "mock-score";
}

function cardHtml(result, { selected = false, justStreamed = false } = {}) {
  const cls = ["mock-card"];
  if (selected) cls.push("selected");
  if (justStreamed) cls.push("just-streamed");
  return (
    `<div class="${cls.join(" ")}">` +
      `<img class="thumb" src="shared/samples/${escHtml(result.file)}" alt="">` +
      `<div class="body">` +
        `<div class="fn"><span>${escHtml(result.name)}</span>` +
        `<span class="${scoreClass(result.score)}"><span class="bar"><i style="width:${Math.round(result.score * 100)}%"></i></span>${result.score.toFixed(2)}</span></div>` +
        `<div class="snip">${escHtml(result.snippet)}</div>` +
      `</div>` +
    `</div>`
  );
}

function renderCardsComplete(scenario) {
  cardsEl.innerHTML = scenario.results.map((r) => cardHtml(r, { selected: r.top === true })).join("");
}

function renderPreview(result) {
  const rows = [];
  if (result.type) rows.push(`<dt>Type</dt><dd>${escHtml(result.type)}</dd>`);
  if (result.date) rows.push(`<dt>Date</dt><dd>${escHtml(result.date)}</dd>`);
  if (result.keywords && result.keywords.length) rows.push(`<dt>Keys</dt><dd>${escHtml(result.keywords.join(", "))}</dd>`);
  previewEl.innerHTML =
    `<img class="hero" src="shared/samples/${escHtml(result.file)}" alt="">` +
    `<h6>${escHtml(result.name)}</h6>` +
    `<div class="rel">Relevance ${Math.round(result.score * 100)}%</div>` +
    `<dl>${rows.join("")}</dl>`;
}

function renderCrumbs(scenario) {
  // Surface the same search term Finder just failed on, so the "after" is
  // visibly answering the identical query.
  crumbsEl.textContent = `“${scenario.search}” · top ${scenario.results.length}`;
}

function renderComplete(scenario) {
  statusRowEl.className = "mock-status-row complete";
  statusRowEl.innerHTML = `<span class="mock-complete-check">✓</span><span>${scenario.results.length} results · ${scenario.elapsedLabel}</span>`;
}

function renderCompleteFrame(scenario) {
  renderSidebar(scenario);
  renderCrumbs(scenario);
  renderComplete(scenario);
  renderCardsComplete(scenario);
  renderPreview(scenario.results.find((r) => r.top) ?? scenario.results[0]);
}

function sleep(ms) { return new Promise((r) => setTimeout(r, ms)); }

function beat(name, scenario) {
  window.dispatchEvent(new CustomEvent("mock:beat", { detail: { beat: name, scenario: scenario.id } }));
}

function finderIconHtml(item) {
  return (
    `<div class="finder-item">` +
      `<div class="finder-item-thumb"><img src="shared/samples/${escHtml(item.file)}" alt=""></div>` +
      `<div class="finder-item-name">${escHtml(item.name)}</div>` +
    `</div>`
  );
}

// Act 1 — the pile: a Finder folder full of junk-named scans.
async function renderPile(scenario) {
  beat("pile", scenario);
  finderEl.classList.remove("hidden");
  finderSearchEl.classList.remove("typing");
  finderSearchQEl.className = "finder-search-q ph";
  finderSearchQEl.textContent = "Search";
  finderTitleEl.textContent = scenario.folder.name;
  finderEmptyEl.style.display = "none";
  finderGridEl.style.display = "";
  finderGridEl.innerHTML = scenario.files.map(finderIconHtml).join("");
  finderStatusEl.textContent = `${scenario.folder.itemCount} items`;
  await sleep(1600);
}

// Act 2a — the failed hunt: the search term typed into Finder search.
async function typeFinderSearch(scenario) {
  beat("keyword-typed", scenario);
  const term = scenario.search;
  finderSearchEl.classList.add("typing");
  finderSearchQEl.className = "finder-search-q";
  finderSearchQEl.textContent = "";
  for (let i = 1; i <= term.length; i++) {
    finderSearchQEl.textContent = term.slice(0, i);
    await sleep(95);
  }
  await sleep(550);
}

// Act 2b — nothing matches (scanned images have no text layer), then hand off to chaserAI.
async function showNoResults(scenario) {
  beat("no-results", scenario);
  finderGridEl.style.display = "none";
  finderEmptyEl.style.display = "flex";
  finderEmptySubEl.textContent = `“${scenario.search}” isn’t in any filename — and scans have no text to read.`;
  finderStatusEl.textContent = "0 items";
  await sleep(1900);
  finderEl.classList.add("hidden"); // cross-fade out to reveal chaserAI
  await sleep(450);
}

async function typeQuery(scenario) {
  // The results screen has no visible query input in the PRD's illustration,
  // but this beat keeps the four-beat contract identical to search-ai-mode.html
  // so capture.mjs can key off the same event names for both pages.
  await sleep(scenario.search.length * 20);
  beat("query-typed", scenario);
}

function resetFrame() {
  document.getElementById("sweep-track").style.display = "none";
  const feed = document.getElementById("scan-feed");
  feed.style.display = "none";
  feed.innerHTML = "";
  statusRowEl.innerHTML = "";
  cardsEl.innerHTML = "";
  previewEl.innerHTML = "";
  sidebarEl.innerHTML = "";
  crumbsEl.textContent = "";
}

async function runScanning(scenario) {
  beat("scanning", scenario);
  const sweep = document.getElementById("sweep-track");
  const feed = document.getElementById("scan-feed");
  sweep.style.display = "";
  feed.style.display = "flex";
  for (const item of scenario.files) {
    const prev = feed.querySelector(".latest");
    if (prev) prev.classList.remove("latest");
    const row = document.createElement("div");
    row.className = "mock-scan-feed-row latest";
    row.innerHTML =
      `<span class="mock-scan-feed-dot"></span>` +
      `<span class="mock-scan-feed-filename">${escHtml(item.name)}</span>` +
      `<span class="mock-scan-feed-folder">${escHtml(scenario.folder.path)}</span>`;
    feed.appendChild(row);
    while (feed.children.length > 4) feed.removeChild(feed.firstChild);
    await sleep(220);
  }
  sweep.style.display = "none";
  feed.style.display = "none";
}

async function runVerifying(scenario) {
  beat("verifying", scenario);
  statusRowEl.className = "mock-status-row grading";
  statusRowEl.innerHTML = `<span class="spin"></span><span>verifying results…</span>`;
  renderSidebar(scenario);
  renderCrumbs(scenario);
  cardsEl.innerHTML = scenario.results.map(() => `<div class="mock-skel"><div class="ln w90"></div><div class="ln w60"></div></div>`).join("");
  await sleep(900);
}

async function runStreaming(scenario) {
  const skeletons = cardsEl.querySelectorAll(".mock-skel");
  for (let i = 0; i < scenario.results.length; i++) {
    const result = scenario.results[i];
    const wrapper = document.createElement("div");
    wrapper.innerHTML = cardHtml(result, { selected: result.top === true, justStreamed: true });
    const card = wrapper.firstElementChild;
    skeletons[i].replaceWith(card);
    if (result.top) renderPreview(result);
    await sleep(450);
  }
}

async function runScenario(scenario) {
  resetFrame();
  await renderPile(scenario);        // Act 1 — the pile
  await typeFinderSearch(scenario);  // Act 2a — keyword typed
  await showNoResults(scenario);     // Act 2b — no matches, hand off
  await typeQuery(scenario);         // Act 3 — chaserAI
  await runScanning(scenario);
  await runVerifying(scenario);
  await runStreaming(scenario);
  renderComplete(scenario);
  beat("complete", scenario);
  await sleep(3500);
}

async function runLoop() {
  const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (reduced) {
    finderEl.classList.add("hidden"); // static frame shows the chaserAI "after" state
    renderCompleteFrame(scenarios[0]);
    for (const name of ["pile", "keyword-typed", "no-results", "query-typed", "scanning", "verifying", "complete"]) beat(name, scenarios[0]);
    return;
  }
  while (true) {
    for (const scenario of scenarios) {
      await runScenario(scenario);
    }
  }
}

runLoop();
</script>
</body>
</html>
